services:
  db:
    image: postgres:16-alpine
    container_name: boutique-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-boutique}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    # Bind to localhost by default: the API reaches the DB over the internal
    # compose network, so the host port must NOT be exposed to the internet.
    # Local dev keeps 127.0.0.1:5432 (DBeaver); on the VPS reach it via SSH
    # tunnel only. Never set DB_HOST_BIND to 0.0.0.0 in production.
    ports:
      - '${DB_HOST_BIND:-127.0.0.1}:${DB_HOST_PORT:-5432}:5432'
    volumes:
      - boutique_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: boutique-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      # Seed the catalog on boot if empty (idempotent; never wipes data).
      SEED_ON_START: ${SEED_ON_START:-false}
      # Base URL the seed writes into product imageUrl (must be the public
      # host in production, e.g. https://borcelle-api.ondeploy.store).
      ASSETS_BASE_URL: ${ASSETS_BASE_URL:-http://localhost:3000}
      DATABASE_URL: 'postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-boutique}?schema=public'
      # Payment provider (sandbox) — interpolated from your local .env, never committed
      PAYMENTS_BASE_URL: ${PAYMENTS_BASE_URL}
      PAYMENTS_PUBLIC_KEY: ${PAYMENTS_PUBLIC_KEY}
      PAYMENTS_PRIVATE_KEY: ${PAYMENTS_PRIVATE_KEY}
      PAYMENTS_INTEGRITY_SECRET: ${PAYMENTS_INTEGRITY_SECRET}
      PAYMENTS_ACCEPTANCE_TOKEN: ${PAYMENTS_ACCEPTANCE_TOKEN:-}
      BASE_FEE_IN_CENTS: ${BASE_FEE_IN_CENTS:-0}
      DELIVERY_FEE_IN_CENTS: ${DELIVERY_FEE_IN_CENTS:-0}
      TAX_RATE_PERCENT: ${TAX_RATE_PERCENT:-0}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-120}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-true}
      SWAGGER_PATH: ${SWAGGER_PATH:-docs}
    ports:
      - '${API_HOST_PORT:-3000}:${PORT:-3000}'
    volumes:
      # Live product photos: drop files in public/ without rebuilding.
      - ./public:/app/public:ro

  seed:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      ASSETS_BASE_URL: ${ASSETS_BASE_URL:-http://localhost:3000}
      DATABASE_URL: 'postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-boutique}?schema=public'
    entrypoint: ['/bin/sh', '-c', 'pnpm prisma db seed']
    profiles: ['seed']

volumes:
  # Renamed to force a clean re-init after changing DB credentials
  # (POSTGRES_USER/PASSWORD only apply on a fresh volume).
  boutique_db_data:
